{% extends 'base.html' %}

{% block title %}Add Post{% endblock %}
{% block css %}
  <style>
    .post-form{
      width: 500px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 5px;
    }
    .input-field{
      padding: 5px;
      width: 300px;
      border-radius: 5px;
      margin-bottom: 5px;
      border: 1px solid #ccc;
    }
    .submit-btn{
      background-color: #007BFF;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
{% endblock %}

{% block content %}
  <h1>Add Post</h1>
  <form method="POST" class="post-form">
    <div>
      <label for="title">Title:</label>
      <input type="text" id="title" name="title" required class="input-field">
    </div>
    <div>
      <label for="content">Content:</label>
      <textarea id="content" name="content" required class="input-field"></textarea>
    </div>
    <div>
      <label for="auther">Author:</label>
      <input type="text" id="auther" name="auther" required class="input-field">
    </div>
    <button type="submit" class="submit-btn">Add Post</button>
  </form>
{% endblock %}
