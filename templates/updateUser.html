{% extends "base.html" %}

{% block title %}
Update User
{% endblock %}

{% block css %}
<style>
    .container {
        max-width: 600px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        background-color: #f9f9f9;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h1>Update User</h1>
    <form method="POST" action="{{ url_for('update_user', id=user.id) }}">
        {{ form.hidden_tag() }}
        <div class="form-group">
            {{ form.name.label }}
            {{ form.name() }}
        </div>
        <div class="form-group">
            {{ form.age.label }}
            {{ form.age() }}
        </div>
        {{ form.submit() }}
    </form>
</div>
{% endblock %}
