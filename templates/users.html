{% extends "base.html" %}

{% block title%}
Users Page
{% endblock %}

{% block css%}
<style>
    .users{
        text-align: center;
        margin-top: 50px;
    }
</style>
{% endblock %}

{% block content%}
<div class="users">
    <h1>Users Page</h1>
    <p><a href="{{ url_for('add_user') }}" class="btn btn-primary">Add User</a></p>
    <ul>
        {% for user in users %}
            <li>
                {{ user.name }}, Age: {{ user.age }}
                - <a href="{{ url_for('update_user', id=user.id) }}">Edit</a>
                - <a href="{{ url_for('delete_user', id=user.id) }}">Delete</a>
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
